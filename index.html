<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard (Dock UI)</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0d1117;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --label-color: #8b949e;
            --accent-blue: #58a6ff;
            --buy-color: #238636;
            --sell-color: #da3633;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 90% Chart Area */
        .chart-container {
            height: 90vh;
            width: 100vw;
            position: relative;
            background: var(--bg-color);
        }

        #miniChart {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Floating Info Overlay */
        .chart-info-overlay {
            position: absolute;
            top: 16px;
            right: 16px;
            text-align: right;
            pointer-events: none;
            z-index: 10;
        }
        .header-title { font-size: 14px; font-weight: 600; color: var(--text-color); opacity: 0.8; }
        #live-price { color: var(--buy-color); font-size: 24px; font-family: monospace; font-weight: bold; margin-top: 4px; }

        /* On-Chart Trade Tags */
        .on-chart-trade {
            position: absolute;
            background: rgba(13, 17, 23, 0.9);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 10;
            transform: translateY(-50%);
            margin-left: 4px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            transition: top 0.2s, left 0.2s; /* Smooth out stagger adjustments */
        }

        .btn-close {
            background: transparent; border: none; color: var(--sell-color); cursor: pointer; padding: 2px 4px; font-size: 12px; font-weight: bold;
        }
        .btn-close:hover { color: #ff5555; }

        /* 10% Bottom Area */
        .bottom-area {
            height: 10vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
        }

        /* The Dock / Taskbar */
                .controls-container {
                    display: grid;
                    grid-auto-flow: column;
                    grid-auto-columns: 1fr;
                    border: 1px solid var(--border-color);
                    border-radius: 0;
                    overflow: hidden;
                    height: 65%;
                    width: 96vw;
                    max-width: 700px;
                    background: #000000;
                    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
                }

                .dock-item {
                    border: none;
                    border-right: 1px solid var(--border-color);
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    padding: 0 4px;
                    transition: background 0.2s;
                }

                .controls-container > *:last-child {
                    border-right: none;
                }

        .dock-input {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            width: 100%;
            outline: none;
            cursor: pointer;
            -moz-appearance: textfield;
        }

        .dock-input::-webkit-outer-spin-button,
        .dock-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .dock-input option {
            background: var(--card-bg);
        }

        .btn-action {
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            width: 100%;
            height: 100%;
            transition: 0.1s;
        }

        .btn-action:hover { background: rgba(255,255,255,0.05); }
        .btn-action:active { background: rgba(255,255,255,0.1); }
        .btn-buy { color: var(--buy-color); }
        .btn-sell { color: var(--sell-color); }

        .balance-item { cursor: pointer; }
                .balance-item:hover { background: rgba(255,255,255,0.05); }
                #accBalance { color: var(--accent-blue); font-size: 13px; font-weight: bold; }

                /* Trades Pop-up */
                .trades-popup {
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    background: var(--card-bg);
                    border: 1px solid var(--border-color);
                    border-radius: 8px;
                    padding: 16px;
                    width: 300px;
                    max-height: 60vh;
                    overflow-y: auto;
                    z-index: 100;
                    display: none;
                    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
                }
                .trades-popup-header {
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    margin-bottom: 12px;
                    font-weight: bold;
                    font-size: 14px;
                }
                .trades-popup-close {
                    background: transparent;
                    border: none;
                    color: var(--text-color);
                    cursor: pointer;
                    font-size: 16px;
                }
                .trade-list-item {
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    padding: 8px 0;
                    border-bottom: 1px solid var(--border-color);
                    font-size: 12px;
                }
                .trade-list-item:last-child { border-bottom: none; }

                                /* Mobile Squeeze Styles */
                                                @media (max-width: 768px) {
                                                    .controls-container {
                                                        width: 96vw;
                                                        border-radius: 0;
                                                        overflow-x: visible;
                                                    }
                                                    .dock-item {
                                                        padding: 0 2px;
                                                    }
                                                    .dock-input, #accBalance {
                                                        font-size: 12px;
                                                        padding: 0;
                                                    }
                                                    .btn-action {
                                                        gap: 0;
                                                    }
                                                    .btn-action svg {
                                                        width: 18px;
                                                        height: 18px;
                                                    }
                                                }
                            </style>
</head>
<body>

<div class="chart-container" id="chart-wrapper">
    <div class="chart-info-overlay">
        <div class="header-title">Gold (XAU/USD)</div>
        <div id="live-price">Connecting...</div>
    </div>
    
    <!-- Canvas Chart -->
        <canvas id="miniChart"></canvas>
    </div>

    <div class="trades-popup" id="tradesPopup">
        <div class="trades-popup-header">
            <span>Active Trades</span>
            <button class="trades-popup-close" onclick="toggleTradesPopup()">✕</button>
        </div>
        <div id="tradesListContent">No active trades.</div>
    </div>

<!-- Bottom Dock UI -->
<div class="bottom-area">
    <div class="controls-container">
        
        <div class="dock-item balance-item" onclick="toggleAccount()" title="Toggle Real/Demo">
            <span id="accBalance">--</span>
        </div>

        <div class="dock-item" title="Time">
                    <select id="timeframeSelect" class="dock-input" style="-webkit-appearance: none; appearance: none;">
                        <option value="1">1s</option>
                        <option value="5">5s</option>
                        <option value="8" selected>8s</option>
                        <option value="15">15s</option>
                        <option value="60">1m</option>
                    </select>
                </div>

                <div class="dock-item" title="Principal">
                    <input type="number" id="principal" class="dock-input" value="1.00" step="0.01">
                </div>

                <div class="dock-item" style="padding: 0;">
                    <button class="btn-action btn-buy" onclick="openTrade('buy')" title="Buy (Up)">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                    </button>
                </div>

                <div class="dock-item" style="padding: 0;">
                    <button class="btn-action btn-sell" onclick="openTrade('sell')" title="Sell (Down)">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
                    </button>
                </div>

                <div class="dock-item" title="Leverage">
                    <select id="tradeLeverage" class="dock-input" style="-webkit-appearance: none; appearance: none;">
                        <option value="100">100x</option>
                        <option value="300">300x</option>
                        <option value="500" selected>500x</option>
                        <option value="800">800x</option>
                    </select>
                </div>
        
        <div class="dock-item" style="padding: 0;">
            <button class="btn-action" onclick="toggleTradesPopup()" title="Trades">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            </button>
        </div>

    </div>
</div>

<script>
    const TOKEN = "pat_aa50bbfd81b361ad5ed0114329ed2753c651560a143f67f511011dccaaf37e90";
    const APP_ID = "33wuhc3RztQ6f2rwZijoR";
    const API_BASE = "https://api.derivws.com";
    let ws;
    let currentPrice = 0;
    let activeTrades = {};
    let isDemoAcc = true;
        let tickHistory = [];
        let pendingTrade = null;

        // Pan & Zoom state
        let panOffset = 0;
        let zoomLevel = 1;
        let isDragging = false;
        let dragStartX = 0;
        let lastTouchX = 0;
        let initialPinchDistance = null;
        let initialZoom = 1;

        // Trades popup state
        let popupOpen = false;

    async function getAccountId() {
        const res = await fetch(`${API_BASE}/trading/v1/options/accounts`, {
            method: 'GET',
            headers: { 'Deriv-App-ID': APP_ID, 'Authorization': `Bearer ${TOKEN}` }
        });
        const json = await res.json();
        const accounts = Array.isArray(json.data) ? json.data : [];
        const targetAccount = accounts.find(acct => isDemoAcc ? acct.account_type === "demo" : acct.account_type !== "demo");
        if (!targetAccount) throw new Error("Account not found");
        return targetAccount.account_id;
    }

    async function getWsUrl(accountId) {
        const res = await fetch(`${API_BASE}/trading/v1/options/accounts/${accountId}/otp`, {
            method: 'POST',
            headers: { 'Deriv-App-ID': APP_ID, 'Authorization': `Bearer ${TOKEN}` }
        });
        const json = await res.json();
        return json.data.url;
    }

    async function connectAPI() {
        try {
            document.getElementById('live-price').innerText = "Connecting...";
            const accountId = await getAccountId();
            const wsUrl = await getWsUrl(accountId);

            ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                ws.send(JSON.stringify({ ticks_history: "frxXAUUSD", end: "latest", count: 1000, style: "ticks", subscribe: 1 }));
                ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
            };

            ws.onmessage = (msg) => {
                const data = JSON.parse(msg.data);
                
                if (data.history) {
                    const times = data.history.times;
                    const prices = data.history.prices;
                    for (let i = 0; i < times.length; i++) tickHistory.push({ time: times[i], price: prices[i] });
                    currentPrice = prices[prices.length - 1];
                    updateUI();
                }

                if (data.tick) {
                    currentPrice = data.tick.quote;
                    tickHistory.push({ time: data.tick.epoch, price: currentPrice });
                    if (tickHistory.length > 1500) tickHistory.shift();
                    updateUI();
                }

                if (data.msg_type === 'buy') {
                    const contractId = data.buy.contract_id;
                    const entryTime = tickHistory.length > 0 ? tickHistory[tickHistory.length - 1].time : Math.floor(Date.now() / 1000);
                    const tDir = pendingTrade ? pendingTrade.direction : 'buy';
                    
                    activeTrades[contractId] = { 
                                            buyPrice: data.buy.buy_price,
                                            entrySpot: currentPrice,
                                            entryTime: entryTime,
                                            direction: tDir,
                                            multiplier: pendingTrade ? pendingTrade.multiplier : 100,
                                            principal: pendingTrade ? pendingTrade.principal : 1,
                                            profit: 0
                                        };

                    const chartWrapper = document.getElementById('chart-wrapper');
                    const dirColor = tDir === 'buy' ? 'var(--buy-color)' : 'var(--sell-color)';
                    
                    chartWrapper.insertAdjacentHTML('beforeend', `
                        <div id="chart-trade-${contractId}" class="on-chart-trade" style="display: none;">
                            <span style="color: ${dirColor}; font-weight: bold;">${tDir.toUpperCase()}</span>
                            <span id="chart-pnl-${contractId}" style="font-family: monospace; font-weight: bold;">$0.00</span>
                            <button class="btn-close" onclick="closeTrade(${contractId})">✕</button>
                        </div>
                    `);

                    ws.send(JSON.stringify({ proposal_open_contract: 1, contract_id: contractId, subscribe: 1 }));
                    
                } else if (data.msg_type === 'proposal_open_contract') {
                    const poc = data.proposal_open_contract;
                    if (poc && poc.contract_id) {
                        const realPnl = parseFloat(poc.profit) || 0;
                        const pnlColor = realPnl >= 0 ? 'var(--buy-color)' : 'var(--sell-color)';
                        const sign = realPnl >= 0 ? '+' : '';

                        const chartPnlEl = document.getElementById(`chart-pnl-${poc.contract_id}`);
                        if (chartPnlEl) {
                            chartPnlEl.style.color = pnlColor;
                            chartPnlEl.innerText = `${sign}$${Math.abs(realPnl).toFixed(2)}`;
                        }

                        if (poc.is_sold || poc.status === 'sold') handleTradeClosed(poc.contract_id);
                                                if (popupOpen) renderTradesList();
                                            }
                } else if (data.msg_type === 'sell') {
                    handleTradeClosed(data.sell.contract_id);
                } else if (data.msg_type === 'balance') {
                                    document.getElementById('accBalance').innerText = `${data.balance.balance.toFixed(2)}`;
                                }
            };

            ws.onclose = () => setTimeout(connectAPI, 3000);
        } catch (err) {
            document.getElementById('live-price').innerText = "Auth Failed";
        }
    }

    connectAPI();

    function updateUI() {
            document.getElementById('live-price').innerText = currentPrice.toFixed(3);
            drawMiniChart();
            if (popupOpen) renderTradesList();
        }

        function toggleTradesPopup() {
            popupOpen = !popupOpen;
            const popup = document.getElementById('tradesPopup');
            popup.style.display = popupOpen ? 'block' : 'none';
            if (popupOpen) renderTradesList();
        }

        function renderTradesList() {
                    const content = document.getElementById('tradesListContent');
                    const keys = Object.keys(activeTrades);
                    if (keys.length === 0) {
                        content.innerHTML = "No active trades.";
                        return;
                    }
                    let html = "";
                    keys.forEach(id => {
                        const t = activeTrades[id];
                        const pnlEl = document.getElementById(`chart-pnl-${id}`);
                        const pnlText = pnlEl ? pnlEl.innerText : "$0.00";
                        const dirColor = t.direction === 'buy' ? 'var(--buy-color)' : 'var(--sell-color)';
                
                        const posSize = (t.principal || 1) * t.multiplier;
                        const comm = (t.principal || 1) * 0.06;
                        const breakEvenMove = comm / posSize;
                        const breakEvenPrice = t.direction === 'buy' ? t.entrySpot * (1 + breakEvenMove) : t.entrySpot * (1 - breakEvenMove);

                        html += `
                            <div class="trade-list-item" style="flex-direction: column; align-items: flex-start; gap: 8px;">
                                <div style="display: flex; justify-content: space-between; width: 100%;">
                                    <div>
                                        <strong style="color:${dirColor}">${t.direction.toUpperCase()}</strong> #${id.toString().slice(-4)}<br>
                                        <span style="color:var(--label-color)">Entry: ${t.entrySpot.toFixed(3)}</span>
                                    </div>
                                    <div style="text-align: right;">
                                        <strong style="color:${pnlText.startsWith('+') ? 'var(--buy-color)' : 'var(--sell-color)'}">${pnlText}</strong><br>
                                        <button class="btn-close" onclick="closeTrade(${id})">Close</button>
                                    </div>
                                </div>
                                <div style="display: flex; justify-content: space-between; width: 100%; font-size: 10px; background: rgba(255,255,255,0.05); padding: 4px 6px; border-radius: 4px;">
                                    <span style="color:var(--label-color)">Comm: <span style="color:var(--sell-color)">-$${comm.toFixed(2)}</span></span>
                                    <span style="color:var(--label-color)">Break-even: <span style="color:var(--text-color)">${breakEvenPrice.toFixed(3)}</span></span>
                                </div>
                            </div>
                        `;
                    });
                    content.innerHTML = html;
                }

    function openTrade(direction) {
        if (currentPrice === 0) return;
        const lev = parseInt(document.getElementById('tradeLeverage').value);
        const prin = parseFloat(document.getElementById('principal').value) || 1.0;
        pendingTrade = { direction: direction, multiplier: lev, principal: prin };

        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
                buy: "1", price: Number(prin * 3), 
                parameters: { amount: Number(prin), basis: "stake", contract_type: direction === 'buy' ? "MULTUP" : "MULTDOWN", currency: "USD", multiplier: lev, underlying_symbol: "frxXAUUSD" }
            }));
        }
    }

    function closeTrade(id) { if (ws) ws.send(JSON.stringify({ sell: id, price: 0 })); }
    
    function handleTradeClosed(id) {
        if (activeTrades[id]) delete activeTrades[id];
        const tag = document.getElementById(`chart-trade-${id}`);
        if (tag) tag.remove();
    }
    
    function toggleAccount() {
        isDemoAcc = !isDemoAcc;
        document.getElementById('accBalance').innerText = "--";
        if (ws) ws.close(); else connectAPI();
    }

    // Handle Resize
        window.addEventListener('resize', drawMiniChart);

        // Setup chart interactivity
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('miniChart');
        
            // Mouse pan
            canvas.addEventListener('mousedown', e => { isDragging = true; dragStartX = e.clientX; });
            window.addEventListener('mousemove', e => {
                if (!isDragging) return;
                panOffset += (e.clientX - dragStartX);
                if (panOffset < 0) panOffset = 0;
                dragStartX = e.clientX;
                drawMiniChart();
            });
            window.addEventListener('mouseup', () => isDragging = false);

            // Touch pan & pinch zoom
            canvas.addEventListener('touchstart', e => {
                if (e.touches.length === 1) {
                    isDragging = true;
                    lastTouchX = e.touches[0].clientX;
                } else if (e.touches.length === 2) {
                    initialPinchDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    initialZoom = zoomLevel;
                }
            }, {passive: true});

            canvas.addEventListener('touchmove', e => {
                if (e.touches.length === 1 && isDragging) {
                    panOffset += (e.touches[0].clientX - lastTouchX);
                    if (panOffset < 0) panOffset = 0;
                    lastTouchX = e.touches[0].clientX;
                    drawMiniChart();
                } else if (e.touches.length === 2 && initialPinchDistance) {
                    const currentDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    zoomLevel = Math.max(0.2, Math.min(5, initialZoom * (currentDistance / initialPinchDistance)));
                    drawMiniChart();
                }
            }, {passive: true});

            canvas.addEventListener('touchend', () => {
                isDragging = false;
                initialPinchDistance = null;
            });

            // Wheel zoom
            canvas.addEventListener('wheel', e => {
                const zoomDelta = e.deltaY > 0 ? 0.9 : 1.1;
                zoomLevel = Math.max(0.2, Math.min(5, zoomLevel * zoomDelta));
                drawMiniChart();
                e.preventDefault();
            }, {passive: false});
        });

        function drawMiniChart() {
        const canvas = document.getElementById('miniChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        const container = canvas.parentElement;
        const width = container.clientWidth;
        const height = container.clientHeight;
        
        const dpr = window.devicePixelRatio || 1;
        if (canvas.width !== width * dpr || canvas.height !== height * dpr) {
            canvas.width = width * dpr;
            canvas.height = height * dpr;
        }
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        
        ctx.clearRect(0, 0, width, height);
        if (tickHistory.length < 2) return;

        const candleTime = parseInt(document.getElementById('timeframeSelect').value) || 8;
        const candlesMap = new Map();
        
        tickHistory.forEach(t => {
            const group = Math.floor(t.time / candleTime) * candleTime;
            if (!candlesMap.has(group)) candlesMap.set(group, { time: group, open: t.price, high: t.price, low: t.price, close: t.price });
            else {
                let c = candlesMap.get(group);
                c.high = Math.max(c.high, t.price); c.low = Math.min(c.low, t.price); c.close = t.price;
            }
        });
        
        const candles = Array.from(candlesMap.values()).sort((a,b) => a.time - b.time);
        const yAxisWidth = 60;
        const xAxisHeight = 20;
        const chartAreaWidth = width - yAxisWidth;
        const chartHeight = height - xAxisHeight;

        const candleWidth = Math.max(2, 8 * zoomLevel);
                const totalCandleWidth = Math.max(3, 12 * zoomLevel);
                const emptyGridSpace = chartAreaWidth * 0.3; 
                const drawableWidth = chartAreaWidth - emptyGridSpace;
        
                const getGlobalX = (globalIdx) => drawableWidth - ((candles.length - 1 - globalIdx) * totalCandleWidth) + panOffset;

                const visibleCandles = candles.filter((c, i) => {
                    const x = getGlobalX(i);
                    return x >= -totalCandleWidth && x <= chartAreaWidth;
                });

                if (visibleCandles.length === 0) return;

                // ONLY base chart min/max on visible candles so it doesn't zoom out violently
                let minPrice = Math.min(...visibleCandles.map(c => c.low));
                let maxPrice = Math.max(...visibleCandles.map(c => c.high));

                let range = maxPrice - minPrice || 1;
                // Increase padding to make the chart look "smaller" and strictly centered
                let pad = range * 0.8; 
                minPrice -= pad; 
                maxPrice += pad;
                range = maxPrice - minPrice;

                const getY = (price) => chartHeight - ((price - minPrice) / range) * chartHeight;
        
                const getX = (localIndex) => {
                    const globalIdx = candles.indexOf(visibleCandles[localIndex]);
                    return getGlobalX(globalIdx);
                };

                // Soft Horizontal Grid & Price Labels
                                ctx.lineWidth = 1;
                                for(let i=1; i<5; i++) {
                                    let yLine = (chartHeight / 5) * i;
                                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)'; // Soft grid color
                                    ctx.beginPath(); ctx.moveTo(0, yLine); ctx.lineTo(chartAreaWidth, yLine); ctx.stroke();
                    
                                    ctx.fillStyle = '#8b94b0'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                                    ctx.fillText((maxPrice - (range * (i/5))).toFixed(3), chartAreaWidth + 6, yLine);
                                }
        
                                // Time Axis Base Line
                                ctx.strokeStyle = '#1e2459';
                                ctx.beginPath(); ctx.moveTo(0, chartHeight); ctx.lineTo(chartAreaWidth, chartHeight); ctx.stroke();
        
                                // Soft Vertical Grid & Time Labels
                                let lastTimeX = -100;
                                ctx.textAlign = 'center'; ctx.textBaseline = 'top';
                                for (let i = 0; i < visibleCandles.length; i++) {
                                    const x = getX(i) + candleWidth/2;
                                    if (x - lastTimeX > 60) {
                                        // Soft vertical grid line
                                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                                        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, chartHeight); ctx.stroke();

                                        // Time label
                                        ctx.fillStyle = '#8b94b0';
                                        const d = new Date(visibleCandles[i].time * 1000);
                                        const tStr = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0') + ':' + d.getSeconds().toString().padStart(2, '0');
                                        ctx.fillText(tStr, x, chartHeight + 4);
                                        lastTimeX = x;
                                    }
                                }

                // Candles
        for (let i = 0; i < visibleCandles.length; i++) {
            const c = visibleCandles[i];
            const color = c.close >= c.open ? '#238636' : '#da3633';
            const x = getX(i);
            ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(x + candleWidth/2, getY(c.high)); ctx.lineTo(x + candleWidth/2, getY(c.low)); ctx.stroke();
            const yTop = Math.min(getY(c.open), getY(c.close));
            const yBot = Math.max(getY(c.open), getY(c.close));
            ctx.fillRect(x, yTop, candleWidth, Math.max(1, yBot - yTop));
        }
        
        // Trades and collision tracking
        const placedBoxes = [];
        
        Object.keys(activeTrades).forEach(id => {
            const t = activeTrades[id];
            if (t.entrySpot) {
                const entryY = getY(t.entrySpot);
                const burstY = getY(t.direction === 'buy' ? t.entrySpot * (1 - (1/t.multiplier)) : t.entrySpot * (1 + (1/t.multiplier)));
                
                const posSize = (t.principal || 1) * t.multiplier;
                                const comm = (t.principal || 1) * 0.06; 

                                const breakEvenMove = comm / posSize;
                                const breakEvenPrice = t.direction === 'buy' ? t.entrySpot * (1 + breakEvenMove) : t.entrySpot * (1 - breakEvenMove);
                                const breakEvenY = getY(breakEvenPrice);

                                ctx.strokeStyle = '#58a6ff'; ctx.setLineDash([4, 4]);
                                ctx.beginPath(); ctx.moveTo(0, entryY); ctx.lineTo(chartAreaWidth, entryY); ctx.stroke();
                
                                ctx.strokeStyle = 'rgba(218, 54, 51, 0.8)'; ctx.setLineDash([2, 2]);
                                ctx.beginPath(); ctx.moveTo(0, burstY); ctx.lineTo(chartAreaWidth, burstY); ctx.stroke();

                                // Break-even Line (White dotted)
                                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)'; ctx.setLineDash([1, 4]);
                                ctx.beginPath(); ctx.moveTo(0, breakEvenY); ctx.lineTo(chartAreaWidth, breakEvenY); ctx.stroke();
                
                                ctx.setLineDash([]);

                const el = document.getElementById(`chart-trade-${id}`);
                if (el && t.entryTime) {
                    const matchIdx = visibleCandles.findIndex(c => c.time >= Math.floor(t.entryTime / candleTime) * candleTime);
                    let exactX = matchIdx !== -1 ? getX(matchIdx) + (candleWidth/2) : getX(visibleCandles.length - 1) + (candleWidth/2);
                    
                    if (exactX >= 0) {
                        let finalX = Math.min(exactX, chartAreaWidth - 100); 
                        let finalY = entryY + (t.direction === 'buy' ? -15 : 15);
                        
                        // Smart Collision Detection to prevent overlapping close buttons
                        let collisionAttempts = 0;
                        while(placedBoxes.some(box => Math.abs(box.x - finalX) < 80 && Math.abs(box.y - finalY) < 28) && collisionAttempts < 10) {
                            // Nudge the tag further up or down based on trade direction to avoid overlap
                            finalY += (t.direction === 'buy' ? -28 : 28); 
                            collisionAttempts++;
                        }
                        
                        // Register this tag's area as occupied
                        placedBoxes.push({x: finalX, y: finalY});

                        el.style.left = `${finalX}px`;
                        el.style.top = `${finalY}px`;
                        el.style.display = 'flex';
                    } else {
                        el.style.display = 'none';
                    }
                }
            }
        });
        
        // Current Price
        const currentY = getY(currentPrice);
        const isUp = currentPrice >= (visibleCandles[visibleCandles.length-1]?.open || 0);
        ctx.strokeStyle = isUp ? '#238636' : '#da3633';
        ctx.setLineDash([3, 3]); ctx.beginPath(); ctx.moveTo(0, currentY); ctx.lineTo(chartAreaWidth, currentY); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = ctx.strokeStyle; ctx.fillRect(chartAreaWidth, currentY - 11, yAxisWidth, 22);
        ctx.fillStyle = '#fff'; ctx.fillText(currentPrice.toFixed(3), chartAreaWidth + (yAxisWidth/2), currentY);
    }
</script>
</body>
</html>
