<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Trading Terminal</title>
    <style>
        /* Base layout */
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-family: sans-serif;
        }

        /* 90% Edge-to-Edge Chart */
        .chart-container {
            height: 90vh;
            width: 100vw;
        }

        /* 10% Single-Line Grid */
        .controls-container {
            height: 10vh;
            width: 100vw;
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: 1fr;
        }

        /* Plain table-grid styling for all items */
        .controls-container > * {
            border: 1px solid black;
            background: white;
            color: black;
            font-size: clamp(10px, 1.2vw, 14px);
            text-align: center;
            box-sizing: border-box;
            margin-left: -1px; /* Collapses borders together like a real table */
            margin-top: -1px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .controls-container > button {
            cursor: pointer;
        }
        
        .controls-container > input {
            cursor: text;
        }
    </style>
</head>
<body>

    <div class="chart-container">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
          <div id="tv_chart" style="height:100%;width:100%"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
          <script type="text/javascript">
          new TradingView.widget({
              "autosize": true,
              "symbol": "BINANCE:BTCUSDT",
              "interval": "15",
              "timezone": "Etc/UTC",
              "theme": "light",
              "style": "1",
              "locale": "en",
              "enable_publishing": false,
              "hide_top_toolbar": true,    /* Hides the top options */
              "hide_legend": true,         /* Hides the on-chart legend */
              "save_image": false,
              "container_id": "tv_chart"
          });
          </script>
        </div>
    </div>

    <div class="controls-container">
        <!-- Replaced Chart Options -->
        <input type="text" value="BTCUSDT" title="Symbol" />
        <button>15m</button>
        <button>1H</button>
        <button>1D</button>
        <button>Indicators</button>
        
        <!-- Action Buttons -->
        <button>Buy Market</button>
        <button>Sell Market</button>
        <button>Close</button>
    </div>

</body>
</html>
