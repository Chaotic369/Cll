<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Dock Terminal</title>
    <style>
        /* Base layout */
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-family: sans-serif;
            background: white;
        }

        /* 90% Edge-to-Edge Chart */
        .chart-container {
            height: 90vh;
            width: 100vw;
        }

        /* 10% Bottom Area to hold the taskbar */
        .bottom-area {
            height: 10vh;
            width: 100vw;
            display: flex;
            justify-content: center; /* Centers the taskbar horizontally */
            align-items: center;     /* Centers the taskbar vertically */
        }

        /* iPad / Mac Taskbar (Dock) styling */
        .controls-container {
            display: grid;
            grid-auto-flow: column;
            border: 1px solid black;
            border-radius: 16px; /* Gives the Mac dock rounded edges */
            overflow: hidden;    /* Clips the internal buttons to the rounded corners */
            height: 60%;         /* Makes the bar slightly smaller than the 10vh area */
        }

        /* Plain table-grid styling for items inside the dock */
        .controls-container > * {
            border: none;
            border-right: 1px solid black; /* Creates the table grid lines between buttons */
            background: white;
            color: black;
            font-size: clamp(10px, 1.2vw, 14px);
            text-align: center;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 1.5vw; /* Spaces the buttons out based on screen size */
            outline: none;
        }

        /* Remove the grid line on the very last button to keep the outer border clean */
        .controls-container > *:last-child {
            border-right: none;
        }

        .controls-container > button {
            cursor: pointer;
        }
        
        .controls-container > input {
            cursor: text;
            width: 80px;
        }
    </style>
</head>
<body>

    <div class="chart-container">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
          <div id="tv_chart" style="height:100%;width:100%"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
          <script type="text/javascript">
          new TradingView.widget({
              "autosize": true,
              "symbol": "BINANCE:BTCUSDT",
              "interval": "15",
              "timezone": "Etc/UTC",
              "theme": "light",
              "style": "1",
              "locale": "en",
              "enable_publishing": false,
              "hide_top_toolbar": true,    /* Hides the top options */
              "hide_legend": true,         /* Hides the on-chart legend */
              "save_image": false,
              "container_id": "tv_chart"
          });
          </script>
        </div>
    </div>

    <!-- Bottom area with centered dock -->
    <div class="bottom-area">
        <div class="controls-container">
            <!-- Replaced Chart Options -->
            <input type="text" value="BTCUSDT" title="Symbol" />
            <button>15m</button>
            <button>1H</button>
            <button>1D</button>
            <button>Indicators</button>
            
            <!-- Action Buttons -->
            <button>Buy Market</button>
            <button>Sell Market</button>
            <button>Close</button>
        </div>
    </div>

</body>
</html>
